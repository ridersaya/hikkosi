<title>引っ越し準備リスト</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#F8FAFC;min-height:100vh;}
#app{max-width:640px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;}

/* タブバー */
#tab-bar{display:flex;align-items:center;background:white;border-bottom:3px solid #EEF2FF;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:0 8px 0 12px;}
#tab-left{display:flex;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#tab-left::-webkit-scrollbar{display:none;}
.main-tab{display:flex;align-items:center;gap:6px;padding:13px 12px 10px;border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;color:#94A3B8;transition:color .15s,border-color .15s;}
.main-tab.active{border-bottom-color:var(--accent)!important;color:var(--accent)!important;}
.main-tab-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:#E2E8F0;color:#94A3B8;transition:all .2s;}
.main-tab.active .main-tab-avatar{color:white;}
#tab-right{display:flex;align-items:center;gap:6px;padding-right:4px;flex-shrink:0;}
#total-pct{display:flex;flex-direction:column;align-items:center;min-width:32px;}
#total-pct-num{font-size:13px;font-weight:800;color:#334155;line-height:1;}
#total-pct-label{font-size:9px;color:#94A3B8;margin-top:1px;}
#csv-btn{background:none;border:1.5px solid #E2E8F0;border-radius:20px;padding:5px 10px;font-size:15px;cursor:pointer;color:#64748B;line-height:1;}

/* バナー */

/* セクション */
.section{display:none;flex-direction:column;flex:1;}
.section.active{display:flex;}

/* ヘッダー */
.sec-header{padding:20px 20px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.sec-header-info{flex:1;}
.sec-title{margin:0;color:white;font-size:20px;font-weight:700;}
.sec-subtitle{margin:3px 0 0;color:rgba(255,255,255,.8);font-size:11px;}
.name-edit-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0;opacity:.75;}
.name-input-field{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);border-radius:8px;padding:4px 10px;font-size:18px;font-weight:700;color:white;outline:none;width:150px;}

/* 検索 */
.search-wrap{display:flex;align-items:center;background:white;margin:14px 14px 0;border-radius:11px;border:1px solid #E2E8F0;padding:0 12px;gap:7px;}
.search-wrap input{flex:1;border:none;outline:none;padding:11px 0;font-size:13px;background:transparent;color:#334155;}
.search-clear{background:none;border:none;cursor:pointer;color:#94A3B8;font-size:13px;padding:3px;display:none;}

/* フィルタタブ */
.filter-tabs{display:flex;gap:5px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{white-space:nowrap;background:white;border:1.5px solid #E2E8F0;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;color:#64748B;transition:all .15s;flex-shrink:0;}
.filter-tab.active{font-weight:700;}

/* リスト */
.item-list{flex:1;padding:0 14px 110px;display:flex;flex-direction:column;gap:10px;}
.card{background:white;border-radius:13px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-left:4px solid;background:#F8FAFC;}
.card-header-right{display:flex;align-items:center;gap:6px;}
.cat-label{font-weight:700;font-size:12px;color:#334155;}
.cat-price{font-size:10px;color:#64748B;}
.cat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.item-row{display:flex;align-items:center;padding:11px 14px;border-top:1px solid #F1F5F9;gap:9px;transition:opacity .2s;}
.item-row.done{opacity:.5;}
.check-btn{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;}
.check-box{width:19px;height:19px;border-radius:6px;border:2px solid #CBD5E1;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:white;}
.item-text-wrap{flex:1;min-width:0;}
.item-text{font-size:13px;color:#334155;line-height:1.4;display:block;}
.item-text.done{text-decoration:line-through;}
.item-tags{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.price-tag{font-size:11px;color:#10B981;font-weight:700;background:#ECFDF5;padding:1px 6px;border-radius:10px;}
.paid-tag{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;}
.memo-tag{font-size:11px;color:#64748B;background:#F1F5F9;padding:1px 7px;border-radius:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.memo-input{border:1.5px solid #E2E8F0;border-radius:7px;padding:6px 9px;font-size:12px;color:#334155;outline:none;background:white;width:100%;box-sizing:border-box;}
.edit-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:0 3px;opacity:.5;}
.del-btn{background:none;border:none;cursor:pointer;font-size:12px;opacity:.4;padding:0 3px;color:#94A3B8;}
.empty-small{color:#94A3B8;font-size:12px;padding:11px 14px;margin:0;}

/* インライン編集 */
.inline-edit{background:#F8FAFC;border-top:1px solid #F1F5F9;padding:10px 14px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.inline-edit input{border:1.5px solid #E2E8F0;border-radius:7px;padding:6px 9px;font-size:12px;color:#334155;outline:none;background:white;width:110px;}
.paid-label{font-size:11px;color:#64748B;white-space:nowrap;align-self:center;}
.paid-btn{font-size:11px;font-weight:700;border:1.5px solid;border-radius:20px;padding:3px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.done-edit-btn{background:#10B981;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;color:white;cursor:pointer;}

/* 空 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;color:#94A3B8;font-size:14px;gap:10px;text-align:center;}
.empty-state span{font-size:40px;}

/* フッター */
.sec-footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;padding:10px 14px 28px;background:linear-gradient(to top,#F8FAFC 65%,transparent);z-index:50;}
.fab-wrap{display:flex;gap:8px;justify-content:flex-end;}
.fab{color:white;border:none;border-radius:26px;padding:13px 22px;font-size:13px;font-weight:700;cursor:pointer;}
.fab-sec{background:white;border:2px solid;border-radius:26px;padding:11px 16px;font-size:12px;font-weight:700;cursor:pointer;}
.add-form{background:white;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;box-shadow:0 4px 24px rgba(0,0,0,.12);}
.add-form-row{display:flex;gap:8px;}
.add-form select,.add-form input{border:1.5px solid #E2E8F0;border-radius:7px;padding:9px 10px;font-size:13px;color:#334155;outline:none;background:white;font-family:inherit;}
.add-form select{background:#F8FAFC;font-size:12px;padding:7px 10px;}
.add-actions{display:flex;gap:7px;justify-content:flex-end;}
.cancel-btn{background:white;border:1.5px solid #E2E8F0;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;color:#64748B;}
.confirm-btn{border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;color:white;}

/* 清算パネル */
.settle-panel{background:white;border-radius:16px;padding:20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin:14px;}
.settle-title{font-size:15px;font-weight:800;color:#334155;margin-bottom:16px;}
.settle-empty{color:#94A3B8;font-size:13px;line-height:1.7;text-align:center;padding:16px 0;}
.bar-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-name{font-size:12px;font-weight:700;color:#334155;width:52px;flex-shrink:0;}
.bar-track{flex:1;height:10px;background:#F1F5F9;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .5s ease;}
.bar-amt{font-size:12px;font-weight:800;width:80px;text-align:right;flex-shrink:0;}
.settle-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.settle-row-label{font-size:12px;color:#64748B;}
.settle-row-val{font-size:13px;font-weight:700;color:#334155;}
.settle-row.dashed{border-bottom:1px dashed #E2E8F0;padding-bottom:10px;margin-bottom:10px;}
.settle-result{background:#F8FAFC;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;}
.settle-chip{color:white;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;}
.settle-arrow{font-size:12px;color:#64748B;}
.settle-amt{font-size:15px;font-weight:800;color:#334155;}
.settle-even{background:#ECFDF5;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;color:#059669;text-align:center;margin-top:4px;}
.settle-toggle-btn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.6);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;color:white;cursor:pointer;white-space:nowrap;}

/* モーダル */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal-box{background:white;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:640px;box-shadow:0 -4px 30px rgba(0,0,0,.15);max-height:85vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:800;color:#334155;}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#94A3B8;padding:4px;}
/* CSVモーダル */
.modal-section{margin-bottom:4px;}
.modal-sec-title{font-size:13px;font-weight:800;color:#334155;margin-bottom:6px;}
.modal-desc{font-size:12px;color:#64748B;line-height:1.7;margin:0 0 10px;}
.modal-btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;color:white;cursor:pointer;transition:background .2s;}
.modal-btn-outline{background:white;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px 16px;font-size:13px;font-weight:700;color:#64748B;cursor:pointer;white-space:nowrap;}
.csv-row{display:flex;gap:8px;margin-bottom:10px;}
#csv-preview{width:100%;height:160px;border:1.5px solid #E2E8F0;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;color:#334155;background:#F8FAFC;resize:none;line-height:1.6;display:none;}
/* 同期ログ */
#sync-log{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:612px;z-index:150;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.sync-toast{background:rgba(30,41,59,.88);color:white;font-size:12px;padding:8px 14px;border-radius:20px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.18);animation:fadeIn .2s ease;backdrop-filter:blur(4px);}
.sync-toast.ok{background:rgba(5,150,105,.9);}
.sync-toast.err{background:rgba(220,38,38,.9);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

let _fbSaveTimer = null;
function saveData(d){
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer = setTimeout(()=>{
    DB_REF.set(d)
      .then(()=>showToast('✅ 保存しました', 'ok'))
      .catch(e=>showToast('❌ 保存失敗: '+e.message, 'err'));

}

// ── CSV 生成 ───────────────────────────────────────────────
function buildCsv(){
  const rows=[];
  const p0=state.persons[0].name,p1=state.persons[1].name;
  rows.push([esc('=== 引っ越しタスク ===')].join(','));
  rows.push([esc('担当者'),esc('カテゴリ'),esc('タスク'),esc('完了')].join(','));
  for(const person of state.persons){
    for(const cat of person.categories){
      for(const item of cat.items){
        rows.push([esc(person.name),esc(cat.label),esc(item.text),esc(item.done?'✅':'')].join(','));
      }
    }
  }
  rows.push('');
  rows.push([esc('=== 買うものリスト ===')].join(','));
  rows.push([esc('カテゴリ'),esc('品名'),esc('値段'),esc('購入済み'),esc('支払者')].join(','));
  for(const cat of state.shopping.categories){
    for(const item of cat.items){
      const pn=item.paidBy==='0'?p0:item.paidBy==='1'?p1:'';
      rows.push([esc(cat.label),esc(item.text),esc(parsePrice(item.price)||''),esc(item.done?'✅':''),esc(pn)].join(','));
    }
  }
  rows.push('');
  rows.push([esc('=== 支払い清算 ===')].join(','));
  const shopItems=state.shopping.categories.flatMap(c=>c.items).filter(i=>i.done);
  const pd0=shopItems.filter(i=>i.paidBy==='0').reduce((s,i)=>s+parsePrice(i.price),0);
  const pd1=shopItems.filter(i=>i.paidBy==='1').reduce((s,i)=>s+parsePrice(i.price),0);
  const tot=pd0+pd1;
  rows.push([esc(p0+' の支払合計'),esc(pd0)].join(','));
  rows.push([esc(p1+' の支払合計'),esc(pd1)].join(','));
  rows.push([esc('合計'),esc(tot)].join(','));
  rows.push([esc('1人あたり'),esc(Math.round(tot/2))].join(','));
  const diff=pd0-pd1;
  if(diff!==0){
    const from=diff>0?p1:p0,to=diff>0?p0:p1;
    rows.push([esc('清算'),esc(from+' → '+to+' に '+fmtY(Math.round(Math.abs(diff)/2)))].join(','));
  }
  return '\uFEFF'+rows.join('\n');
}

// ── レンダリング ──────────────────────────────────────────────
function render(){
  saveData(state);
  updateTabBar();
  renderPersonSection(0);
  renderPersonSection(1);
  renderShoppingSection();
  updateActiveSection();
}

function updateTabBar(){
  const items=state.persons.flatMap(p=>p.categories.flatMap(c=>c.items));
  const pct=items.length?Math.round(items.filter(i=>i.done).length/items.length*100):0;
  document.getElementById('total-pct-num').textContent=pct+'%';

  for(let i=0;i<2;i++){
    const name=state.persons[i].name;
    document.getElementById('tab-name-'+i).textContent=name;
    const av=document.getElementById('avatar-'+i);
    av.textContent=name[0];
    const t=PERSON_THEMES[i];
    const tab=document.querySelector('[data-section="person-'+i+'"]');
    if(tab.classList.contains('active')){
      av.style.background=t.gradient;av.style.color='white';
    } else {
      av.style.background='#E2E8F0';av.style.color='#94A3B8';
    }
  }
  // shoppingアバター
  const shopTab=document.querySelector('[data-section="shopping"]');
  const shopAv=shopTab.querySelector('.main-tab-avatar');
  if(shopTab.classList.contains('active')){
    shopAv.style.background=SHOP_THEME.gradient;shopAv.style.color='white';
  } else {
    shopAv.style.background='#E2E8F0';shopAv.style.color='#94A3B8';
  }
}

function updateActiveSection(){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('section-'+activeSection).classList.add('active');
  document.querySelector('[data-section="'+activeSection+'"]').classList.add('active');
  updateTabBar();
}

// ── SVG円グラフ ───────────────────────────────────────────────
function circleSVG(pct,color='white'){
  const r=25,c=30,circ=2*Math.PI*r;
  const off=circ*(1-pct/100);
  return `<svg width="56" height="56" viewBox="0 0 60 60">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="5"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="white" stroke-width="5"
      stroke-dasharray="${circ}" stroke-dashoffset="${off}"
      stroke-linecap="round" transform="rotate(-90 ${c} ${c})"
      style="transition:stroke-dashoffset .5s"/>
    <text x="${c}" y="35" text-anchor="middle" fill="white" font-size="12" font-weight="700">${pct}%</text>
  </svg>`;
}

  const done=cat.items.filter(i=>i.done).length;

      <span class="cat-badge" style="background:${cat.color}22;color:${cat.color}">${done}/${cat.items.length}</span>
    </div>
    ${cat.items.length===0?`<p class="empty-small">アイテムなし</p>`:''}
    ${cat.items.map(item=>`
      <div class="item-row${item.done?' done':''}" id="item-${item.id}">
        <button class="check-btn" onclick="togglePersonItem('person-${idx}','${cat.id}','${item.id}')">
          <div class="check-box" style="${item.done?`background:${cat.color};border-color:${cat.color}`:'border-color:#CBD5E1'}">
            ${item.done?'✓':''}
          </div>
        </button>
        <span class="item-text${item.done?' done':''}">${esc_html(item.text)}</span>
        <button class="del-btn" onclick="deletePersonItem('person-${idx}','${cat.id}','${item.id}')">🗑</button>
      </div>
    `).join('')}
  </div>`;
}

function renderPersonFooter(idx,cats,theme){
  const ui=uiState['person-'+idx];

    return `<div class="add-form" id="add-form-p${idx}">
      <select id="new-cat-p${idx}">
        ${cats.map(c=>`<option value="${c.id}"${c.id===ui.newCat?' selected':''}>${esc_html(c.label)}</option>`).join('')}

      <input id="new-item-p${idx}" placeholder="追加するアイテム…" autocomplete="off">

        <button class="confirm-btn" style="background:${theme.accent}" onclick="confirmPersonAdd(${idx})">追加</button>
      </div>
    </div>`;
  }
  if(ui.addingCat){
    return `<div class="add-form">
      <input id="new-cat-name-p${idx}" placeholder="新しいカテゴリ名…" autocomplete="off">
      <div class="add-actions">
        <button class="cancel-btn" onclick="cancelPersonCat(${idx})">キャンセル</button>

function setupPersonFooterEvents(idx,cats,theme){
  const ui=uiState['person-'+idx];
  if(ui.adding){
    const inp=document.getElementById('new-item-p'+idx);
    if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')confirmPersonAdd(idx);};}
    const sel=document.getElementById('new-cat-p'+idx);
    if(sel) sel.onchange=e=>{ui.newCat=e.target.value;};
  }
  if(ui.addingCat){
    const inp=document.getElementById('new-cat-name-p'+idx);
    if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')confirmPersonCat(idx);};}

function renderSettlePanel(allItems,p0,p1){
  const bought=allItems.filter(i=>i.done);
  const pd0=bought.filter(i=>i.paidBy==='0').reduce((s,i)=>s+parsePrice(i.price),0);
  const pd1=bought.filter(i=>i.paidBy==='1').reduce((s,i)=>s+parsePrice(i.price),0);
  const tot=pd0+pd1;
  const diff=pd0-pd1;
  const hasPaid=pd0>0||pd1>0;

  if(!hasPaid) return `<div class="settle-panel">
    <div class="settle-title">💰 支払い清算</div>
    <p class="settle-empty">購入済みのアイテムに支払者を設定すると<br>清算金額が計算されます</p>
  </div>`;

  const w0=tot?Math.round(pd0/tot*100):0;
  const w1=tot?Math.round(pd1/tot*100):0;
  let settleHtml='';
  if(diff!==0){
    const fi=diff>0?1:0,ti=diff>0?0:1;
    const fn=fi===0?p0:p1,tn=ti===0?p0:p1;
    const fc=PERSON_THEMES[fi].accent,tc=PERSON_THEMES[ti].accent;
    settleHtml=`<div class="settle-result">
      <span class="settle-chip" style="background:${fc}">${esc_html(fn)}</span>
      <span class="settle-arrow">が</span>
      <span class="settle-chip" style="background:${tc}">${esc_html(tn)}</span>
      <span class="settle-arrow">に</span>
      <span class="settle-amt">${fmtY(Math.round(Math.abs(diff)/2))}</span>
      <span class="settle-arrow">払うと均等に</span>
    </div>`;
  } else {
    settleHtml=`<div class="settle-even">✅ ちょうど均等です！</div>`;
  }

  return `<div class="settle-panel">
    <div class="settle-title">💰 支払い清算</div>
    <div class="bar-wrap">
      ${[{n:p0,pd:pd0,w:w0,c:PERSON_THEMES[0].accent},{n:p1,pd:pd1,w:w1,c:PERSON_THEMES[1].accent}].map(p=>`
        <div class="bar-row">
          <span class="bar-name">${esc_html(p.n)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${p.w}%;background:${p.c}"></div></div>
          <span class="bar-amt" style="color:${p.c}">${fmtY(p.pd)}</span>
        </div>
      `).join('')}
    </div>
    <div class="settle-row"><span class="settle-row-label">合計</span><span class="settle-row-val">${fmtY(tot)}</span></div>
    <div class="settle-row dashed"><span class="settle-row-label">1人あたり</span><span class="settle-row-val">${fmtY(Math.round(tot/2))}</span></div>
    ${settleHtml}
  </div>`;
}

function renderShopCat(cat,p0,p1){
  const done=cat.items.filter(i=>i.done).length;
  const catTotal=cat.items.reduce((s,i)=>s+parsePrice(i.price),0);
  const ui=uiState.shopping;
  return `<div class="card">
    <div class="card-header" style="border-left-color:${cat.color}">
      <span class="cat-label">${esc_html(cat.label)}</span>
      <div class="card-header-right">
        ${catTotal?`<span class="cat-price">${fmtY(catTotal)}</span>`:''}
        <span class="cat-badge" style="background:${cat.color}22;color:${cat.color}">${done}/${cat.items.length}</span>
      </div>
    </div>
    ${cat.items.length===0?`<p class="empty-small">アイテムなし</p>`:''}
    ${cat.items.map(item=>{
      const isEd=ui.editingItem&&ui.editingItem.catId===cat.id&&ui.editingItem.itemId===item.id;
      const pbl=item.paidBy==='0'?{label:p0,color:PERSON_THEMES[0].accent}:item.paidBy==='1'?{label:p1,color:PERSON_THEMES[1].accent}:null;
      return `<div>
        <div class="item-row${item.done?' done':''}" id="item-${item.id}">
          <button class="check-btn" onclick="toggleShopItem('${cat.id}','${item.id}')">
            <div class="check-box" style="${item.done?`background:${SHOP_THEME.accent};border-color:${SHOP_THEME.accent}`:'border-color:#CBD5E1'}">
              ${item.done?'✓':''}
            </div>
          </button>
          <div class="item-text-wrap">
            <span class="item-text${item.done?' done':''}">${esc_html(item.text)}</span>
            <div class="item-tags">
              ${item.price?`<span class="price-tag">${fmtY(parsePrice(item.price))}</span>`:''}
              ${pbl?`<span class="paid-tag" style="background:${pbl.color}18;color:${pbl.color}">💳 ${esc_html(pbl.label)}</span>`:''}
              ${item.memo?`<span class="memo-tag">📝 ${esc_html(item.memo)}</span>`:''}
            </div>
          </div>
          <button class="edit-btn" onclick="toggleShopEdit('${cat.id}','${item.id}')">✏️</button>
          <button class="del-btn" onclick="deleteShopItem('${cat.id}','${item.id}')">🗑</button>
        </div>
        ${isEd?renderShopEdit(cat,item,p0,p1):''}
      </div>`;
    }).join('')}
  </div>`;
}

    {v:'1',label:p1,color:PERSON_THEMES[1].accent},
    {v:'',label:'未設定',color:'#94A3B8'},
  ];
  return `<div class="inline-edit" id="edit-${item.id}">
    <input type="number" value="${esc_html(item.price)}" placeholder="値段（例: 30000）"
      oninput="updateShopPrice('${cat.id}','${item.id}',this.value)">
    <span class="paid-label">支払者：</span>
    ${opts.map(o=>`
      <button class="paid-btn" style="${item.paidBy===o.v?`background:${o.color};color:white;border-color:${o.color}`:`background:transparent;color:${o.color};border-color:${o.color}`}"
        onclick="updateShopPaid('${cat.id}','${item.id}','${o.v}')">

      oninput="updateShopMemo('${cat.id}','${item.id}',this.value)">

}

// ── フィルタタブ HTML生成 ─────────────────────────────────────
function buildFilterTabs(cats,activeTab,accent,secKey){
  const tabs=[{id:'all',label:'すべて'},{id:'todo',label:'未完了'},{id:'done',label:'完了'},
    ...cats.map(c=>({id:c.id,label:c.label.split(' ').slice(1).join(' '),color:c.color}))];
  return tabs.map(t=>{
    const a=t.id===activeTab;
    const col=t.color||accent;
    const style=a?`border-color:${col};color:${col};font-weight:700`:'';
    return `<button class="filter-tab${a?' active':''}" style="${style}"
      onclick="setFilter('${secKey}','${t.id}')">${esc_html(t.label)}</button>`;
  }).join('');
}
function buildFilterTabsShopping(cats,activeTab){
  return buildFilterTabs(cats,activeTab,SHOP_THEME.accent,'shopping');
}

// ── フィルタ・検索処理 ────────────────────────────────────────
function filterCats(cats,tab,search){
  let result=cats;
  if(tab==='done') result=cats.map(c=>({...c,items:c.items.filter(i=>i.done)})).filter(c=>c.items.length);
  else if(tab==='todo') result=cats.map(c=>({...c,items:c.items.filter(i=>!i.done)})).filter(c=>c.items.length);
  else if(tab!=='all') result=cats.filter(c=>c.id===tab);
  if(search.trim()) result=result.map(c=>({...c,items:c.items.filter(i=>i.text.includes(search.trim()))})).filter(c=>c.items.length);
  return result;
}

// ── esc_html ─────────────────────────────────────────────────
function esc_html(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type=''){
  const log=document.getElementById('sync-log');

// ── Firebase リアルタイム同期 ─────────────────────────────────
// Firebaseは配列をオブジェクトで返すので配列に正規化する
function toArray(val){
  if(!val) return [];
  if(Array.isArray(val)) return val.filter(v=>v!=null);
  return Object.values(val).filter(v=>v!=null);
}
function normalizeState(data){
  if(!data) return data;
  if(data.persons){
    data.persons = toArray(data.persons).map(p=>{
      if(p && p.categories){
        p.categories = toArray(p.categories).map(c=>{
          if(c && c.items) c.items = toArray(c.items);
          return c;
        });
      }
      return p;
    });
  }
  if(data.shopping && data.shopping.categories){
    data.shopping.categories = toArray(data.shopping.categories).map(c=>{
      if(c && c.items) c.items = toArray(c.items);
      return c;
    });
  }
  return data;
}

DB_REF.on('value', (snapshot) => {
  const raw = snapshot.val();
  const data = normalizeState(raw);
  if(data){ state = data; }
  if(!_fbReady){
    _fbReady = true;
    showToast('☁️ Firebaseと接続しました', 'ok');
    render();
  } else {
    showToast('🔄 パートナーが更新しました');
    uiState['person-0'].adding=false; uiState['person-0'].addingCat=false;
    uiState['person-1'].adding=false; uiState['person-1'].addingCat=false;
    uiState['shopping'].adding=false; uiState['shopping'].addingCat=false;
    render();
  }
}, (error)=>{
  showToast('❌ 接続エラー: '+error.message, 'err');
});
