<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>引っ越し準備リスト</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#F8FAFC;min-height:100vh;}
#app{max-width:640px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;}

/* タブバー */
#tab-bar{display:flex;align-items:center;background:white;border-bottom:3px solid #EEF2FF;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:0 8px 0 12px;}
#tab-left{display:flex;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#tab-left::-webkit-scrollbar{display:none;}
.main-tab{display:flex;align-items:center;gap:6px;padding:13px 12px 10px;border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;color:#94A3B8;transition:color .15s,border-color .15s;}
.main-tab.active{border-bottom-color:var(--accent)!important;color:var(--accent)!important;}
.main-tab-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:#E2E8F0;color:#94A3B8;transition:all .2s;}
.main-tab.active .main-tab-avatar{color:white;}
#tab-right{display:flex;align-items:center;gap:6px;padding-right:4px;flex-shrink:0;}
#total-pct{display:flex;flex-direction:column;align-items:center;min-width:32px;}
#total-pct-num{font-size:13px;font-weight:800;color:#334155;line-height:1;}
#total-pct-label{font-size:9px;color:#94A3B8;margin-top:1px;}

/* 期限バナー */
#deadline-banner{display:none;background:linear-gradient(135deg,#EF4444,#F97316);color:white;padding:10px 16px;font-size:12px;font-weight:700;gap:8px;flex-direction:column;}
#deadline-banner.show{display:flex;}
.deadline-item{display:flex;align-items:center;gap:6px;}

/* パートナー同期インジケーター */
#sync-indicator{background:#F8FAFC;border-bottom:1px solid #E2E8F0;padding:6px 16px;font-size:11px;color:#94A3B8;display:flex;align-items:center;gap:5px;}
#sync-indicator.updated{color:#10B981;}

/* セクション */
.section{display:none;flex-direction:column;flex:1;}
.section.active{display:flex;}

/* ヘッダー */
.sec-header{padding:20px 20px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.sec-header-info{flex:1;}
.sec-title{margin:0;color:white;font-size:20px;font-weight:700;}
.sec-subtitle{margin:3px 0 0;color:rgba(255,255,255,.8);font-size:11px;}
.name-edit-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0;opacity:.75;}
.name-input-field{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);border-radius:8px;padding:4px 10px;font-size:18px;font-weight:700;color:white;outline:none;width:150px;}

/* 予算パネル */
.budget-panel{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;margin:0 20px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.budget-label{font-size:11px;color:rgba(255,255,255,.9);font-weight:700;white-space:nowrap;}
.budget-input{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);border-radius:7px;padding:4px 8px;font-size:13px;font-weight:700;color:white;outline:none;width:120px;font-family:inherit;}
.budget-input::placeholder{color:rgba(255,255,255,.6);}
.budget-used{font-size:11px;color:rgba(255,255,255,.85);}

/* 検索 */
.search-wrap{display:flex;align-items:center;background:white;margin:14px 14px 0;border-radius:11px;border:1px solid #E2E8F0;padding:0 12px;gap:7px;}
.search-wrap input{flex:1;border:none;outline:none;padding:11px 0;font-size:13px;background:transparent;color:#334155;}
.search-clear{background:none;border:none;cursor:pointer;color:#94A3B8;font-size:13px;padding:3px;display:none;}

/* フィルタタブ */
.filter-tabs{display:flex;gap:5px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{white-space:nowrap;background:white;border:1.5px solid #E2E8F0;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;color:#64748B;transition:all .15s;flex-shrink:0;}
.filter-tab.active{font-weight:700;}

/* 並べ替え */
.sort-wrap{display:flex;align-items:center;gap:8px;padding:0 14px 8px;}
.sort-label{font-size:11px;color:#94A3B8;}
.sort-btn{font-size:11px;background:white;border:1.5px solid #E2E8F0;border-radius:20px;padding:3px 10px;cursor:pointer;color:#64748B;font-weight:500;}
.sort-btn.active{font-weight:700;border-color:#6366F1;color:#6366F1;}

/* ドラッグ＆ドロップ */
.drag-handle{display:flex;align-items:center;padding:0 8px 0 0;cursor:grab;color:#CBD5E1;font-size:18px;flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none;line-height:1;}
.drag-handle:hover{color:#94A3B8;}
.card{background:white;border-radius:13px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:box-shadow .2s,opacity .2s,transform .15s;}
.card.drag-over{box-shadow:0 0 0 2.5px #6366F1,0 4px 16px rgba(99,102,241,.2);}
.card.dragging{opacity:.3;transform:scale(.98);}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.9;box-shadow:0 8px 32px rgba(0,0,0,.22);border-radius:13px;background:white;padding:11px 16px;font-size:12px;font-weight:700;color:#334155;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* リスト */
.item-list{flex:1;padding:0 14px 110px;display:flex;flex-direction:column;gap:10px;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-left:4px solid;background:#F8FAFC;}
.card-header-right{display:flex;align-items:center;gap:6px;}
.cat-label{font-weight:700;font-size:12px;color:#334155;}
.cat-price{font-size:10px;color:#64748B;}
.cat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.item-row{display:flex;align-items:flex-start;padding:11px 14px;border-top:1px solid #F1F5F9;gap:9px;transition:opacity .2s;}
.item-row.done{opacity:.45;}
.check-btn{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;margin-top:1px;}
.check-box{width:19px;height:19px;border-radius:6px;border:2px solid #CBD5E1;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:white;}
.item-text-wrap{flex:1;min-width:0;}
.item-text{font-size:13px;color:#334155;line-height:1.4;display:block;}
.item-text.done{text-decoration:line-through;}
/* メモ欄（チェックリスト用）*/
.item-memo-row{display:flex;align-items:center;margin-top:5px;gap:5px;}
.item-memo-input{flex:1;font-size:13px;color:#64748B;border:none;border-bottom:1.5px solid #E2E8F0;outline:none;background:transparent;padding:2px 0;font-family:inherit;min-width:0;}
.item-memo-input::placeholder{color:#CBD5E1;}
.item-memo-input:focus{border-bottom-color:#6366F1;}
/* メタ情報行 */
.item-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
/* 重要度タグ */
.prio-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;cursor:pointer;flex-shrink:0;border:none;}
.prio-0{background:#FEE2E2;color:#EF4444;}
.prio-1{background:#FEF9C3;color:#CA8A04;}
.prio-2{background:#DCFCE7;color:#16A34A;}
.prio-none{background:#F1F5F9;color:#94A3B8;}
/* 期限タグ */
.deadline-tag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:#EEF2FF;color:#6366F1;cursor:pointer;white-space:nowrap;}
.deadline-tag.urgent{background:#FEE2E2;color:#EF4444;}
.deadline-tag.soon{background:#FEF9C3;color:#CA8A04;}
/* その他タグ */
.item-tags{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.price-tag{font-size:11px;color:#10B981;font-weight:700;background:#ECFDF5;padding:1px 6px;border-radius:10px;}
.paid-tag{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;}
.memo-tag{font-size:11px;color:#64748B;background:#F1F5F9;padding:1px 7px;border-radius:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.memo-input{border:1.5px solid #E2E8F0;border-radius:7px;padding:6px 9px;font-size:12px;color:#334155;outline:none;background:white;width:100%;box-sizing:border-box;}
.edit-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:0 3px;opacity:.5;flex-shrink:0;}
.del-btn{background:none;border:none;cursor:pointer;font-size:12px;opacity:.4;padding:0 3px;color:#94A3B8;flex-shrink:0;}
.empty-small{color:#94A3B8;font-size:12px;padding:11px 14px;margin:0;}

/* 期限入力 */
.deadline-input{font-size:11px;border:1.5px solid #E2E8F0;border-radius:7px;padding:3px 7px;color:#334155;outline:none;background:white;font-family:inherit;}

/* インライン編集（買うもの用）*/
.inline-edit{background:#F8FAFC;border-top:1px solid #F1F5F9;padding:10px 14px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.inline-edit input{border:1.5px solid #E2E8F0;border-radius:7px;padding:6px 9px;font-size:12px;color:#334155;outline:none;background:white;width:110px;}
.paid-label{font-size:11px;color:#64748B;white-space:nowrap;align-self:center;}
.paid-btn{font-size:11px;font-weight:700;border:1.5px solid;border-radius:20px;padding:3px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.done-edit-btn{background:#10B981;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;color:white;cursor:pointer;}

/* 空 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;color:#94A3B8;font-size:14px;gap:10px;text-align:center;}
.empty-state span{font-size:40px;}

/* フッター */
.sec-footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;padding:10px 14px 28px;background:linear-gradient(to top,#F8FAFC 65%,transparent);z-index:50;}
.fab-wrap{display:flex;gap:8px;justify-content:flex-end;}
.fab{color:white;border:none;border-radius:26px;padding:13px 22px;font-size:13px;font-weight:700;cursor:pointer;}
.fab-sec{background:white;border:2px solid;border-radius:26px;padding:11px 16px;font-size:12px;font-weight:700;cursor:pointer;}
.add-form{background:white;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;box-shadow:0 4px 24px rgba(0,0,0,.12);}
.add-form-row{display:flex;gap:8px;}
.add-form select,.add-form input{border:1.5px solid #E2E8F0;border-radius:7px;padding:9px 10px;font-size:13px;color:#334155;outline:none;background:white;font-family:inherit;}
.add-form select{background:#F8FAFC;font-size:12px;padding:7px 10px;}
.add-actions{display:flex;gap:7px;justify-content:flex-end;}
.cancel-btn{background:white;border:1.5px solid #E2E8F0;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;color:#64748B;}
.confirm-btn{border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;color:white;}

/* 清算パネル */
.settle-panel{background:white;border-radius:16px;padding:20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin:14px;}
.settle-title{font-size:15px;font-weight:800;color:#334155;margin-bottom:16px;}
.settle-empty{color:#94A3B8;font-size:13px;line-height:1.7;text-align:center;padding:16px 0;}
.bar-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-name{font-size:12px;font-weight:700;color:#334155;width:52px;flex-shrink:0;}
.bar-track{flex:1;height:10px;background:#F1F5F9;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .5s ease;}
.bar-amt{font-size:12px;font-weight:800;width:80px;text-align:right;flex-shrink:0;}
.settle-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.settle-row-label{font-size:12px;color:#64748B;}
.settle-row-val{font-size:13px;font-weight:700;color:#334155;}
.settle-row.dashed{border-bottom:1px dashed #E2E8F0;padding-bottom:10px;margin-bottom:10px;}
.settle-result{background:#F8FAFC;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;}
.settle-chip{color:white;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;}
.settle-arrow{font-size:12px;color:#64748B;}
.settle-amt{font-size:15px;font-weight:800;color:#334155;}
.settle-even{background:#ECFDF5;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;color:#059669;text-align:center;margin-top:4px;}
.settle-toggle-btn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.6);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;color:white;cursor:pointer;white-space:nowrap;}

/* 同期ログ */
#sync-log{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:612px;z-index:150;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.sync-toast{background:rgba(30,41,59,.88);color:white;font-size:12px;padding:8px 14px;border-radius:20px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.18);animation:fadeIn .2s ease;backdrop-filter:blur(4px);}
.sync-toast.ok{background:rgba(5,150,105,.9);}
.sync-toast.err{background:rgba(220,38,38,.9);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

function dc(o){return JSON.parse(JSON.stringify(o));}
function parsePrice(v){return parseInt((v||'').replace(/,/g,''))||0;}
function fmtY(n){return '¥'+n.toLocaleString('ja-JP');}
function esc(v){return '"'+String(v??'').replace(/"/g,'""')+'"';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc_html(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 日付ユーティリティ
function today(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const diff=new Date(dateStr)-new Date(today());
  return Math.ceil(diff/86400000);
}
function fmtDate(dateStr){
  if(!dateStr) return '';
  const d=new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// 期限バナー（3日以内）
function checkDeadlines(){
  const banner=document.getElementById('deadline-banner');
  const urgent=[];
  state.persons.forEach((p,pi)=>{
    (p.categories||[]).forEach(c=>{
      (c.items||[]).filter(i=>i&&!i.done&&i.deadline).forEach(item=>{
        const d=daysUntil(item.deadline);
        if(d!==null&&d<=3){
          urgent.push({name:p.name,text:item.text,days:d});
        }
      });
    });
  });
  if(urgent.length===0){banner.className='';return;}
  banner.className='show';
  banner.innerHTML=urgent.map(u=>`
    <div class="deadline-item">
      ⚠️ <strong>${esc_html(u.name)}</strong>「${esc_html(u.text)}」
      ${u.days<0?'が期限を過ぎています':u.days===0?'が本日期限':'まで'+u.days+'日'}
    </div>
  `).join('');
}

// SVG円グラフ
function circleSVG(pct){
  const r=25,c=30,circ=2*Math.PI*r,off=circ*(1-pct/100);
  return `<svg width="56" height="56" viewBox="0 0 60 60">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="5"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="white" stroke-width="5"
      stroke-dasharray="${circ}" stroke-dashoffset="${off}"
      stroke-linecap="round" transform="rotate(-90 ${c} ${c})"
      style="transition:stroke-dashoffset .5s"/>
    <text x="${c}" y="35" text-anchor="middle" fill="white" font-size="12" font-weight="700">${pct}%</text>
  </svg>`;
}

function renderSettlePanel(allItems,p0,p1){
  const bought=allItems.filter(i=>i.done&&i.paidBy&&parsePrice(i.price)>0);
  const pd0=bought.filter(i=>i.paidBy==='0').reduce((s,i)=>s+parsePrice(i.price),0);
  const pd1=bought.filter(i=>i.paidBy==='1').reduce((s,i)=>s+parsePrice(i.price),0);
  const planned=allItems.filter(i=>!i.done&&i.paidBy&&parsePrice(i.price)>0);
  const pp0=planned.filter(i=>i.paidBy==='0').reduce((s,i)=>s+parsePrice(i.price),0);
  const pp1=planned.filter(i=>i.paidBy==='1').reduce((s,i)=>s+parsePrice(i.price),0);
  const ta0=pd0+pp0,ta1=pd1+pp1;
  if((pd0+pd1+pp0+pp1)===0) return `<div class="settle-panel"><div class="settle-title">💰 支払い清算</div><p class="settle-empty">値段と支払者を設定すると<br>清算金額が計算されます</p></div>`;
  function sb(a0,a1,label,accent){
    const t=a0+a1; if(t===0) return '';
    const w0=Math.round(a0/t*100),w1=100-w0,diff=a0-a1;
    let res='';
    if(diff!==0){const fi=diff>0?1:0,ti=1-fi,fn=fi===0?p0:p1,tn=ti===0?p0:p1,fc=PERSON_THEMES[fi].accent,tc=PERSON_THEMES[ti].accent;res=`<div class="settle-result"><span class="settle-chip" style="background:${fc}">${esc_html(fn)}</span><span class="settle-arrow">が</span><span class="settle-chip" style="background:${tc}">${esc_html(tn)}</span><span class="settle-arrow">に</span><span class="settle-amt">${fmtY(Math.round(Math.abs(diff)/2))}</span><span class="settle-arrow">払うと均等に</span></div>`;}
    else res=`<div class="settle-even">✅ ちょうど均等です！</div>`;
    return `<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:${accent};margin-bottom:8px">${label}</div><div class="bar-wrap">${[{n:p0,pd:a0,w:w0,c:PERSON_THEMES[0].accent},{n:p1,pd:a1,w:w1,c:PERSON_THEMES[1].accent}].map(p=>`<div class="bar-row"><span class="bar-name">${esc_html(p.n)}</span><div class="bar-track"><div class="bar-fill" style="width:${p.w}%;background:${p.c}"></div></div><span class="bar-amt" style="color:${p.c}">${fmtY(p.pd)}</span></div>`).join('')}</div><div class="settle-row"><span class="settle-row-label">合計</span><span class="settle-row-val">${fmtY(t)}</span></div><div class="settle-row dashed"><span class="settle-row-label">1人あたり</span><span class="settle-row-val">${fmtY(Math.round(t/2))}</span></div>${res}</div>`;
  }
  const div=`<div style="border-top:1.5px dashed #E2E8F0;margin:4px 0 20px"></div>`;
  const showTotal=(pd0+pd1)>0&&(pp0+pp1)>0;
  return `<div class="settle-panel"><div class="settle-title">💰 支払い清算</div>${sb(pd0,pd1,'✅ 購入済み','#10B981')}${(pd0+pd1)>0&&(pp0+pp1)>0?div:''}${sb(pp0,pp1,'🛒 未購入（予定）','#F59E0B')}${showTotal?div+sb(ta0,ta1,'📊 合計（将来の清算）','#6366F1'):''}</div>`;
}

function buildFilterTabs(cats,activeTab,accent,secKey){
  const tabs=[{id:'all',label:'すべて'},{id:'todo',label:'未完了'},{id:'done',label:'完了'},
    {id:'urgent',label:'🔴急ぎ'},
    ...cats.map(c=>({id:c.id,label:c.label.split(' ').slice(1).join(' '),color:c.color}))];
  return tabs.map(t=>{
    const a=t.id===activeTab;
    const col=t.color||accent;
    const style=a?`border-color:${col};color:${col};font-weight:700`:'';
    return `<button class="filter-tab${a?' active':''}" style="${style}"
      onclick="setFilter('${secKey}','${t.id}')">${esc_html(t.label)}</button>`;
  }).join('');
}
function buildFilterTabsShopping(cats,activeTab){
  return buildFilterTabs(cats,activeTab,SHOP_THEME.accent,'shopping');
}

function filterCats(cats,tab,search,sortBy){
  let result=cats;
  if(tab==='done') result=cats.map(c=>({...c,items:(c.items||[]).filter(i=>i&&i.done)})).filter(c=>c.items.length);
  else if(tab==='todo') result=cats.map(c=>({...c,items:(c.items||[]).filter(i=>i&&!i.done)})).filter(c=>c.items.length);
  else if(tab==='urgent') result=cats.map(c=>({...c,items:(c.items||[]).filter(i=>i&&!i.done&&i.prio===0)})).filter(c=>c.items.length);
  else if(tab!=='all') result=cats.filter(c=>c.id===tab);
  if(search.trim()){
    const q=search.trim();
    result=result.map(c=>({...c,items:(c.items||[]).filter(i=>i&&(i.text.includes(q)||(i.memo||'').includes(q)))})).filter(c=>c.items.length);
  }
  // ソート
  if(sortBy==='deadline'){
    result=result.map(c=>({...c,items:[...(c.items||[])].sort((a,b)=>{
      const da=a.deadline?new Date(a.deadline).getTime():99999999999;
      const db=b.deadline?new Date(b.deadline).getTime():99999999999;
      return da-db;
    })}));
  } else if(sortBy==='prio'){
    result=result.map(c=>({...c,items:[...(c.items||[])].sort((a,b)=>{
      const pa=a.prio!=null?a.prio:99;
      const pb=b.prio!=null?b.prio:99;
      return pa-pb;
    })}));
  }
  return result;
}

// ── カテゴリ自動整理（全完了→末尾 / アイテム0→削除）───────────
function autoSortCats(cats){
  // 1) アイテムが0件のカテゴリを削除
  const filtered=cats.filter(c=>(c.items||[]).filter(i=>i!=null).length>0);
  // 2) 全完了かつ手動移動フラグなし → 末尾へ
  const active=[], done=[];
  for(const c of filtered){
    const items=(c.items||[]).filter(i=>i!=null);
    const allDone=items.length>0&&items.every(i=>i.done);
    if(allDone&&!c._manualOrder){
      // 全完了で未フラグ → 末尾グループへ
      done.push(c);
    } else {
      active.push(c);
    }
  }
  return [...active,...done];
}

// ── カテゴリ並べ替え（PC: D&D / スマホ: 長押しタッチ）─────────
(function setupCatDnD(){
  let dragSrcId=null, dragSection=null, touchTimer=null, ghost=null;
  let touchSrcId=null, touchSection=null;

  // ────── PC: HTML5 Drag API ──────
  function onDragStart(e){
    const card=e.currentTarget;
    // ハンドル以外からのドラッグは無効
    const handle=card.querySelector('.drag-handle');
    if(!handle) return;
    dragSrcId=card.dataset.catId;
    dragSection=card.dataset.section;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',dragSrcId);
    // ドラッグ画像を差し替え
    const label=card.querySelector('.cat-label')?.textContent||'';
    const g=document.createElement('div');
    g.style.cssText='position:fixed;top:-999px;left:-999px;background:white;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;color:#334155;box-shadow:0 4px 16px rgba(0,0,0,.15);white-space:nowrap;';
    g.textContent='⠿ '+label;
    document.body.appendChild(g);
    e.dataTransfer.setDragImage(g,0,0);
    setTimeout(()=>g.remove(),0);
  }
  function onDragEnd(e){
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'));
    dragSrcId=null; dragSection=null;
  }
  function onDragOver(e){
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    const card=e.currentTarget;
    if(card.dataset.catId!==dragSrcId) card.classList.add('drag-over');
  }
  function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
  function onDrop(e){
    e.preventDefault();
    const card=e.currentTarget;
    card.classList.remove('drag-over');
    const destId=card.dataset.catId;
    const sec=card.dataset.section;
    if(!dragSrcId||dragSrcId===destId||sec!==dragSection) return;
    reorderCats(dragSection, dragSrcId, destId);
  }

  // ────── スマホ: タッチ長押し ──────
  function createGhost(label){
    ghost=document.createElement('div');
    ghost.id='drag-ghost';
    ghost.textContent='⠿ '+label;
    document.body.appendChild(ghost);
  }
  function moveGhost(x,y){
    if(!ghost) return;
    ghost.style.left=(x+12)+'px';
    ghost.style.top=(y-20)+'px';
  }
  function removeGhost(){if(ghost){ghost.remove();ghost=null;}}

  function getCardFromPoint(x,y){
    // 指の下の要素を取得
    const els=document.elementsFromPoint(x,y);
    for(const el of els){
      const card=el.closest?.('.card[data-cat-id]');
      if(card) return card;
    }
    return null;
  }

  let lastOverCard=null;
  function onTouchStart(e){
    const card=e.currentTarget;
    const handle=e.target.closest('.drag-handle');
    if(!handle) return; // ハンドルのみ反応
    touchTimer=setTimeout(()=>{
      touchSrcId=card.dataset.catId;
      touchSection=card.dataset.section;
      card.classList.add('dragging');
      const label=card.querySelector('.cat-label')?.textContent||'';
      createGhost(label);
      const t=e.touches[0];
      moveGhost(t.clientX,t.clientY);
      // スクロール無効化
      document.body.style.overflow='hidden';
    },300);
  }
  function onTouchMove(e){
    clearTimeout(touchTimer); touchTimer=null;
    if(!touchSrcId) return;
    e.preventDefault();
    const t=e.touches[0];
    moveGhost(t.clientX,t.clientY);
    const over=getCardFromPoint(t.clientX,t.clientY);
    if(lastOverCard&&lastOverCard!==over) lastOverCard.classList.remove('drag-over');
    if(over&&over.dataset.catId!==touchSrcId&&over.dataset.section===touchSection){
      over.classList.add('drag-over'); lastOverCard=over;
    } else { lastOverCard=null; }
  }
  function onTouchEnd(e){
    clearTimeout(touchTimer); touchTimer=null;
    document.body.style.overflow='';
    if(!touchSrcId){removeGhost();return;}
    const t=e.changedTouches[0];
    const over=getCardFromPoint(t.clientX,t.clientY);
    document.querySelectorAll('.card.dragging,.card.drag-over').forEach(c=>c.classList.remove('dragging','drag-over'));
    removeGhost(); lastOverCard=null;
    if(over&&over.dataset.catId&&over.dataset.catId!==touchSrcId&&over.dataset.section===touchSection){
      reorderCats(touchSection, touchSrcId, over.dataset.catId);
    }
    touchSrcId=null; touchSection=null;
  }

  // ────── 並べ替え実行 ──────
  function reorderCats(section, srcId, destId){
    if(section==='shopping'){
      const cats=state.shopping.categories;
      const si=cats.findIndex(c=>c.id===srcId);
      const di=cats.findIndex(c=>c.id===destId);
      if(si<0||di<0) return;
      const next=[...cats];
      const [moved]=next.splice(si,1);
      // ユーザーが手動移動 → フラグON
      moved._manualOrder=true;
      next.splice(di,0,moved);
      state.shopping.categories=next;
      renderShoppingSection();
    } else {
      const idx=parseInt(section.slice(-1));
      const cats=state.persons[idx].categories;
      const si=cats.findIndex(c=>c.id===srcId);
      const di=cats.findIndex(c=>c.id===destId);
      if(si<0||di<0) return;
      const next=[...cats];
      const [moved]=next.splice(si,1);
      // ユーザーが手動移動 → フラグON
      moved._manualOrder=true;
      next.splice(di,0,moved);
      state.persons[idx].categories=next;
      renderPersonSection(idx);
    }
    saveData(state);
  }

  // ────── イベント登録（描画後に毎回呼ぶ）──────
  window.setupDragListeners=function(){
    document.querySelectorAll('.card[data-cat-id]').forEach(card=>{
      // 古いリスナーを除去してから再登録
      card.removeEventListener('dragstart',onDragStart);
      card.removeEventListener('dragend',onDragEnd);
      card.removeEventListener('dragover',onDragOver);
      card.removeEventListener('dragleave',onDragLeave);
      card.removeEventListener('drop',onDrop);
      card.removeEventListener('touchstart',onTouchStart);
      card.removeEventListener('touchmove',onTouchMove);
      card.removeEventListener('touchend',onTouchEnd);

      card.addEventListener('dragstart',onDragStart);
      card.addEventListener('dragend',onDragEnd);
      card.addEventListener('dragover',onDragOver);
      card.addEventListener('dragleave',onDragLeave);
      card.addEventListener('drop',onDrop);
      card.addEventListener('touchstart',onTouchStart,{passive:false});
      card.addEventListener('touchmove',onTouchMove,{passive:false});
      card.addEventListener('touchend',onTouchEnd);
    });
  };
})();

// ── 同期ログ・トースト ───────────────────────────────────────
function showToast(msg,type=''){
  const log=document.getElementById('sync-log');
  const t=document.createElement('div');
  t.className='sync-toast'+(type?' '+type:'');
  t.textContent=msg;
  log.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(()=>t.remove(),400);},2800);
}

// ── Firebase ────────────────────────────────────────────────
function toArray(val){
  if(!val) return [];
  if(Array.isArray(val)) return val.filter(v=>v!=null);
  return Object.values(val).filter(v=>v!=null);
}
function normalizeState(data){
  if(!data) return data;
  if(data.persons){
    data.persons=toArray(data.persons).map(p=>{
      if(p&&p.categories){
        p.categories=toArray(p.categories).map(c=>{
          if(c) c.items=toArray(c.items).map(i=>{
            if(!i) return i;
            // 新フィールドのデフォルト補完
            if(i.memo===undefined) i.memo='';
            if(i.prio===undefined) i.prio=1;
            if(i.deadline===undefined) i.deadline='';
            return i;
          });
          return c;
        });
      }
      if(p&&p.budget===undefined) p.budget='';
      return p;
    });
  }
  if(data.shopping&&data.shopping.categories){
    data.shopping.categories=toArray(data.shopping.categories).map(c=>{
      if(c) c.items=toArray(c.items).map(i=>{
        if(i&&i.memo===undefined) i.memo='';
        return i;
      });
      return c;
    });
  }
  return data;
}

// 同期インジケーター更新
function updateSyncIndicator(name,time){
  const el=document.getElementById('sync-indicator');
  if(!name){el.textContent='☁️ Firebase 同期中';el.className='';return;}
  el.textContent=`🔄 ${name} が ${time} に更新`;
  el.className='updated';
  setTimeout(()=>{el.className='';},5000);
}

DB_REF.on('value',(snapshot)=>{
  const raw=snapshot.val();
  const data=normalizeState(raw);
  if(data){state=data;}
  if(!_fbReady){
    _fbReady=true;
    document.getElementById('sync-indicator').textContent='☁️ Firebase 接続済み';
    showToast('☁️ Firebaseと接続しました','ok');
    render();
  } else if(_isSavingByMe){
    return;
  } else {
    // パートナー更新
    const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    const other=activeSection.startsWith('person-')?state.persons[1-parseInt(activeSection.slice(-1))]?.name||'パートナー':'パートナー';
    updateSyncIndicator(other,now);
    showToast('🔄 パートナーが更新しました');
    uiState['person-0'].adding=false;uiState['person-0'].addingCat=false;
    uiState['person-1'].adding=false;uiState['person-1'].addingCat=false;
    uiState['shopping'].adding=false;uiState['shopping'].addingCat=false;
    updateTabBar();
    renderPersonSection(0);
    renderPersonSection(1);
    renderShoppingSection();
    checkDeadlines();
  }
},(error)=>{
  showToast('❌ 接続エラー: '+error.message,'err');
  document.getElementById('sync-indicator').textContent='❌ 接続エラー';
});

// 初期描画
render();
</script>
